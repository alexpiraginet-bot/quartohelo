<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Guia Digital — Quarto da Helô · Em breve</title>
<meta name="description" content="O guia de decisão estética para o quarto do seu bebê. Em breve.">
<meta name="theme-color" content="#4A171F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Tipografia (aproximações do manual): Fraunces ≈ Season Mix · Allura ≈ Aston Script -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* Paleta oficial — Brand Book 2026: bordô #67232B · creme #E7DFC7 · caramelo #D2B58E */
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; min-height:100svh; display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:"Jost",-apple-system,sans-serif; font-weight:300; color:#F2E9D6;
    background:linear-gradient(160deg,#67232B 0%, #4A171F 60%, #381017 100%); overflow:hidden; position:relative}
  body::before{content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size:22px 22px; opacity:.7}
  body::after{content:""; position:absolute; inset:0; background:radial-gradient(90% 70% at 70% 15%, rgba(210,181,142,.18), transparent 60%)}
  /* Barrado com a Estampa Geométrica oficial na base — acabamento de tecido. */
  .barrado{position:absolute; left:0; right:0; bottom:0; height:38px; z-index:3;
    background:url("/images/estampa-geometrica.svg"); background-size:auto 38px; background-position:50% 100%; background-repeat:repeat-x;
    border-top:1px solid rgba(231,223,199,.25)}
  .box{position:relative; z-index:2; padding:40px 24px; max-width:52ch}
  .logo img{width:min(300px,64vw); height:auto; margin:0 auto; display:block}
  .eyebrow{margin-top:30px; font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:#DEC7A4}
  h1{font-family:"Fraunces",Georgia,serif; font-weight:400; font-size:clamp(46px,12vw,104px); line-height:1; letter-spacing:.01em; margin:14px 0 0; color:#FAF3E1}
  h1 i{font-style:italic; color:#D2B58E}
  p{margin:22px auto 0; max-width:44ch; color:#E6D5B8; font-size:clamp(15px,2vw,17px); line-height:1.75}
  .rule{width:46px; height:1px; background:rgba(210,181,142,.5); margin:30px auto 0}
  .back{display:inline-flex; align-items:center; gap:9px; margin-top:30px; font-size:12px; letter-spacing:.16em; text-transform:uppercase;
    color:#F0E5CC; border:1px solid rgba(231,223,199,.4); border-radius:999px; padding:12px 22px; text-decoration:none; transition:border-color .25s, transform .25s}
  .back:hover{border-color:#EDE2C8; transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <div class="logo"><img src="/images/logo-vertical-creme.png" alt="Quarto da Helô"></div>
    <div class="eyebrow">Guia digital</div>
    <h1 class="serif">Coming <i>soon</i></h1>
    <p>Do conceito ao último detalhe — o método, o critério e o olhar da Helô para você montar o quarto do seu bebê com curadoria e zero estresse. Estamos preparando cada página com o mesmo primor de sempre.</p>
    <div class="rule"></div>
    <a class="back" href="/">Voltar ao início</a>
  </div>
  <div class="barrado" aria-hidden="true"></div>
<script src="https://alex-hub-three.vercel.app/support-widget.js" data-app="quartohelo" data-accent="#67232B" defer></script>
</body>
</html>
